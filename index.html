<!doctype html>
<html>
  <head>
    <title>Audit App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h2>⚡ Audit App</h2>

    <div class="card">
      <input type="text" id="siteId" placeholder="Site ID" />
      <input type="text" id="siteName" placeholder="Site Name" />
    </div>

    <div class="card">
      <input
        type="text"
        id="search"
        placeholder="Search..."
        oninput="filterList()"
      />
    </div>

    <div class="card" id="list"></div>

    <div class="actions">
      <button class="gen" onclick="generate()">Generate</button>
      <button class="copy" onclick="copyText()">Copy</button>
      <button class="clear" onclick="clearData()">Clear</button>
    </div>

    <pre id="output"></pre>
    <script src="script.js"></script>
  </body>
</html>
