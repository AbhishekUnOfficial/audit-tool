<!doctype html>
<html>
  <head>
    <title>Audit Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h2>&#9889; Audit Tool</h2>

    <div class="card">
      <input type="text" id="siteId" placeholder="Site ID" />
      <input type="text" id="siteName" placeholder="Site Name" />
    </div>

    <div class="card">
      <input
        type="text"
        id="search"
        placeholder="Search..."
        oninput="filterList()"
      />
    </div>

    <div class="card" id="list"></div>

    <div class="actions">
      <button class="gen" onclick="generate()">Generate</button>
      <button class="copy" onclick="copyText()">Copy</button>
      <button class="clear" onclick="clearData()">Clear</button>
    </div>

    <textarea id="output" placeholder="Output will appear here. You can edit and add more points."></textarea>

    <!-- Confirm Modal -->
    <div id="confirmBox" class="modal">
      <div class="modal-content">
        <p>Are you sure you want to clear all data?</p>
        <div class="modal-actions">
          <button class="yes" onclick="confirmYes()">Yes</button>
          <button class="no" onclick="confirmNo()">Cancel</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
